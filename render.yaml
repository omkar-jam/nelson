# Render Blueprint — one-click deploy for Nelson Ferreira site
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
# 1. Push this repo to GitHub/GitLab.
# 2. In Render: Dashboard → New → Blueprint.
# 3. Connect the repo; Render will detect render.yaml and create the database + web service.
# 4. After first deploy, set NEXTAUTH_URL in the web service to your live URL (e.g. https://nelson-xxxx.onrender.com).
# 5. Admin: /admin — default login admin@example.com / changeme (change via ADMIN_EMAIL / ADMIN_PASSWORD env or re-run seed).

databases:
  - name: nelson-db
    databaseName: nelson
    plan: free  # or starter for production

services:
  - type: web
    name: nelson
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nelson-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: nelson-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Set in Dashboard after first deploy to your service URL, e.g. https://nelson-xxxx.onrender.com
      - key: NEXTAUTH_URL
        sync: false
      # Optional: override default admin (default admin@example.com / changeme)
      # - key: ADMIN_EMAIL
      #   sync: false
      # - key: ADMIN_PASSWORD
      #   sync: false
