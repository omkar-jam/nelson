# Render Blueprint — Nelson Ferreira site (Docker web service + PostgreSQL)
#
# How to use:
# 1. New → Blueprint → connect your repo. Apply; Render creates the "nelson" web service and "nelson-db" Postgres.
# 2. Set NEXTAUTH_URL to your service URL (e.g. https://nelson-xxxx.onrender.com) in the nelson service Environment.
# 3. Deploy. The Docker entrypoint runs Prisma migrations (db push) and seed on startup.
# 4. Admin: /admin — sign in with the user created by seed (or set ADMIN_EMAIL/ADMIN_PASSWORD in seed).

databases:
  - name: nelson-db
    plan: free
    databaseName: nelson
    user: nelson

services:
  - type: web
    name: nelson
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nelson-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: nelson-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      # Admin credentials for the seeded admin user (set these in the Render dashboard)
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
