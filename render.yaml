# Render Blueprint — Nelson Ferreira site (web service only; use your existing DB)
# Render free tier allows only ONE free Postgres per account. This blueprint does NOT create a DB.
#
# How to use:
# 1. In Render: use an existing PostgreSQL (or create one outside this blueprint, then use it).
# 2. New → Blueprint → connect omkar-jam/nelson. Apply; only the "nelson" web service will be created.
# 3. In the nelson service: Environment → add DATABASE_URL and DIRECT_URL from your existing database (Internal or External URL).
# 4. Set NEXTAUTH_URL to your service URL (e.g. https://nelson-xxxx.onrender.com) and NEXTAUTH_SECRET (or let it prompt).
# 5. Deploy. Admin: /admin — login admin@example.com / changeme (run seed or set ADMIN_EMAIL/ADMIN_PASSWORD).

services:
  - type: web
    name: nelson
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    envVars:
      # Paste your existing Postgres Internal/External URL in the Dashboard after creating the service
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
